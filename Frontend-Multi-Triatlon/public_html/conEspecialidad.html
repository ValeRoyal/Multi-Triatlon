<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Consultar por Especialidad - Multi-Triatlón</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="conEspecialidad.css" />
  </head>

  <body>
    <header class="nav">
      <a class="nav-logo" href="home.html" aria-label="Volver al home">
        <img src="../Resources/LogoSinFondo.png" alt="Logo de Multi-Triatlón" />
        <h3>Multi-Triatlón</h3>
      </a>

      <nav aria-label="Navegación principal">
        <ul class="nav-links">
          <li><a href="home.html" class="nav-link">Home</a></li>
          <li><a href="perfil.html" class="nav-link">Ver perfil</a></li>
          <li>
            <button class="nav-link nav-link-btn" id="btn-logout" type="button">
              Cerrar sesión
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="page">
      <section class="hero surface hero-wrap">
        <div class="card hero-card">
          <h1>Consultar triatletas por especialidad</h1>
          <p>Hola, <strong id="user-nombre">Atleta</strong>. Selecciona una especialidad.</p>
          
        </div>
      </section>

      <section class="section">
        <div class="card">
          <form id="form-especialidad" class="form-especialidad" novalidate>
            <div class="field">
              <label for="especialidad">Especialidad</label>
              <select id="especialidad" class="input" required>
                <option value="">Selecciona...</option>
                <option>Ciclismo</option>
                <option>Natación</option>
                <option>Carrera</option>
                <option>Distancia SuperSprint</option>
                <option>Distancia Sprint</option>
                <option>Distancia Olímpica</option>
                <option>Media Distancia</option>
                <option>Larga Distancia</option>
                <option>Ultraman</option>
              </select>
              <small class="hint">
                Esta consulta usa el endpoint <code>/api/triatletas/especialidad</code>.
              </small>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-principal" id="btn-consultar">
                Consultar
              </button>
              <button type="button" class="btn btn-secundario" id="btn-limpiar">
                Limpiar
              </button>
            </div>

            <div id="mensaje" class="mensaje" aria-live="polite"></div>
          </form>
        </div>
      </section>

      <section class="section" aria-labelledby="resultados">
        <div class="section-head">
          <h2 id="resultados">Resultados</h2>
          <p id="contador" class="contador">Aún no has consultado.</p>
        </div>

        <div id="resultados-wrap"></div>
      </section>
    </main>

    <script src="conEspecialidad.js" defer></script>
  </body>
</html>
