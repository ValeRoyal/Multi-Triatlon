<!DOCTYPE html>
<html lang="es">

<head>
    <title>Carreras por categoría - Multi-Triatlón</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="conCarreraCategoria.css" />
</head>

<body>
    <header class="nav">
        <a class="nav-logo" href="home.html" aria-label="Volver al home">
            <img src="https://raw.githubusercontent.com/ValeRoyal/Multi-Triatlon/master/Frontend-Multi-Triatlon/Resources/LogoSinFondo.png" alt="Logo de Multi-Triatlón" />
            <h3>Multi-Triatlón</h3>
        </a>

        <nav aria-label="Navegación principal">
            <ul class="nav-links">
                <li><a href="home.html" class="nav-link">Home</a></li>
                <li><a href="perfil.html" class="nav-link">Ver perfil</a></li>
                <li>
                    <button class="nav-link nav-link-btn" id="btn-logout" type="button">
                        Cerrar sesión
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="page">
        <section class="hero surface hero-wrap">
            <div class="card hero-card">
                <h1>Carreras por categoría</h1>
                <p>
                    Hola, <strong id="user-nombre">Atleta</strong>. Selecciona una categoría y consulta todas sus
                    carreras asociadas.
                </p>
            </div>
        </section>

        <!-- Selector de categoría -->
        <section class="section" aria-labelledby="categorias-titulo">
            <div class="card">
                <div class="section-head">
                    <h2 id="categorias-titulo">Categoría</h2>
                    <p class="hint">Selecciona una categoría para consultar.</p>
                </div>

                <div class="actions">
                    <button class="btn btn-principal" id="btn-recargar" type="button">Recargar categorías</button>
                    <button class="btn btn-secundario" id="btn-limpiar" type="button">Limpiar</button>
                </div>

                <div id="mensaje" class="mensaje" aria-live="polite"></div>

                <div class="field">
                    <div id="categorias-estado" class="estado">Cargando categorías...</div>
                    <div id="categorias-scroll" class="categorias-scroll" role="list"></div>
                    <input type="hidden" id="categoria-id" />
                </div>

                <div class="actions">
                    <button class="btn btn-principal" id="btn-consultar" type="button" disabled>
                        Consultar carreras
                    </button>
                </div>
            </div>
        </section>

        <!-- Resultados -->
        <section class="section" aria-labelledby="resultados-titulo">
            <div class="section-head">
                <h2 id="resultados-titulo">Resultados</h2>
                <p id="contador" class="hint">Aún no has consultado.</p>
            </div>
            <div id="resultados-wrap"></div>
        </section>
    </main>

    <script src="conCarreraCategoria.js" defer></script>
</body>

</html>
