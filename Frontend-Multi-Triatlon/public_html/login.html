<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Iniciar sesión - Multi-Triatlón</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <header class="nav">
      <a class="nav-logo" href="index.html" aria-label="Ir al inicio">
        <img src="../Resources/LogoSinFondo.png" alt="Logo de Multi-Triatlón" />
        <h3>Multi-Triatlón</h3>
      </a>

      <nav aria-label="Navegación principal">
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Inicio</a></li>
          <li><a href="login.html" class="nav-link active">Iniciar Sesión</a></li>
          <li><a href="register.html" class="nav-link">Registrarse</a></li>
        </ul>
      </nav>
    </header>

    <main class="page">
      <section class="hero surface hero-wrap">
        <div class="card hero-card">
          <h1>Iniciar sesión</h1>
          <p>Ingresa tu identificación y tu correo.</p>
        </div>
      </section>

      <section class="section" aria-labelledby="login">
        <div class="card login-card">
          <div class="section-head">
            <h2 id="login">Acceso</h2>
            <p>Capturamos los datos y luego tú haces el fetch para validar.</p>
          </div>

          <form id="form-login" class="login-form" novalidate>
            <div class="field">
              <label for="identificacion">Identificación *</label>
              <input
                type="text"
                id="identificacion"
                name="identificacion"
                class="input"
                placeholder="Tu identificación"
                required
                autocomplete="off"
              />
            </div>

            <div class="field">
              <label for="correo">Correo *</label>
              <input
                type="email"
                id="correo"
                name="correo"
                class="input"
                placeholder="tu-correo@ejemplo.com"
                required
                autocomplete="email"
              />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-principal" id="btn-login">Ingresar</button>
              <a class="btn btn-secundario" href="register.html">Crear cuenta</a>
            </div>

            <div id="mensaje-login" class="mensaje-login" aria-live="polite"></div>
          </form>
        </div>
      </section>
    </main>

    <script src="login.js" defer></script>
  </body>
</html>
