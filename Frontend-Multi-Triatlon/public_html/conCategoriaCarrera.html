<!DOCTYPE html>
<html lang="es">

<head>
    <title>Categoría de una carrera - Multi-Triatlón</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="conCategoriaCarrera.css" />
</head>

<body>
    <header class="nav">
        <a class="nav-logo" href="home.html" aria-label="Volver al home">
            <img src="../Resources/LogoSinFondo.png" alt="Logo de Multi-Triatlón" />
            <h3>Multi-Triatlón</h3>
        </a>

        <nav aria-label="Navegación principal">
            <ul class="nav-links">
                <li><a href="home.html" class="nav-link">Home</a></li>
                <li><a href="perfil.html" class="nav-link">Ver perfil</a></li>
                <li>
                    <button class="nav-link nav-link-btn" id="btn-logout" type="button">
                        Cerrar sesión
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="page">
        <section class="hero surface hero-wrap">
            <div class="card hero-card">
                <h1>Categoría de una carrera</h1>
                <p>
                    Hola, <strong id="user-nombre">Atleta</strong>. Selecciona una carrera y consulta su categoría
                    asociada.
                </p>
            </div>
        </section>

        <!-- Selector de carrera -->
        <section class="section" aria-labelledby="carreras-titulo">
            <div class="card">
                <div class="section-head">
                    <h2 id="carreras-titulo">Carrera</h2>
                    <p class="hint">Selecciona una carrera para consultar.</p>
                </div>

                <div class="actions">
                    <button class="btn btn-principal" id="btn-recargar" type="button">Recargar carreras</button>
                    <button class="btn btn-secundario" id="btn-limpiar" type="button">Limpiar</button>
                </div>

                <div id="mensaje" class="mensaje" aria-live="polite"></div>

                <div class="field">
                    <div id="carreras-estado" class="estado">Cargando carreras...</div>
                    <div id="carreras-scroll" class="carreras-scroll" role="list"></div>
                    <input type="hidden" id="carrera-id" />
                </div>

                <div class="actions">
                    <button class="btn btn-principal" id="btn-consultar" type="button" disabled>
                        Consultar categoría
                    </button>
                </div>
            </div>
        </section>

        <!-- Resultado -->
        <section class="section" aria-labelledby="resultado-titulo">
            <div class="section-head">
                <h2 id="resultado-titulo">Resultado</h2>
                <p id="resultado-subtitulo" class="hint">Aún no has consultado.</p>
            </div>
            <div id="resultado-wrap"></div>
        </section>
    </main>

    <script src="conCategoriaCarrera.js" defer></script>
</body>

</html>
